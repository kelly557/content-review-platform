services:
  - type: web
    name: content-review-platform-api
    runtime: python
    plan: free
    rootDir: adreview-platform/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_BASE_URL
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: content-review-platform-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: content-review-platform-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_ROOT
        value: ./storage
      - key: LOG_LEVEL
        value: INFO
      - key: ALERT_SCANNER_ENABLED
        value: "false"
      - key: MQ_CONSUMER_ENABLED
        value: "false"

databases:
  - name: content-review-platform-db
    plan: free
    databaseName: content_review_platform
    user: content_review_platform
